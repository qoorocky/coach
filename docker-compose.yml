services:
  postgres:
    image: postgres:15-alpine
    container_name: coach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coach_cms
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach_dev_password
      TZ: Asia/Taipei
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d coach_cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: coach-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: coach_admin
      MINIO_ROOT_PASSWORD: coach_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: coach-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 coach_admin coach_dev_password;
      mc mb -p local/coach-videos || true;
      mc mb -p local/coach-thumbnails || true;
      mc anonymous set download local/coach-videos;
      mc anonymous set download local/coach-thumbnails;
      exit 0;
      "

volumes:
  postgres-data:
  minio-data:
