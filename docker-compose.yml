services:
  postgres:
    image: postgres:15-alpine
    container_name: coach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coach_cms
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach_dev_password
      TZ: Asia/Taipei
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d coach_cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: coach-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: coach_admin
      MINIO_ROOT_PASSWORD: coach_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: coach-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 coach_admin coach_dev_password;
      mc mb -p local/coach-videos || true;
      mc mb -p local/coach-thumbnails || true;
      mc anonymous set download local/coach-videos;
      mc anonymous set download local/coach-thumbnails;
      exit 0;
      "

  cms-api:
    # `profiles: [api]` keeps the heavy Spring service out of the default
    # local-dev stack (postgres + minio only). Bring it up explicitly with:
    #   docker compose --profile api up -d
    profiles: ["api"]
    build:
      context: ./cms-api
    image: coach/cms-api:dev
    container_name: coach-cms-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: coach_cms
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach_dev_password
      COACH_JWT_SECRET: ${COACH_JWT_SECRET:-dev-only-jwt-secret-change-in-prod-please-use-at-least-32-bytes}
      COACH_JWT_COOKIE_SECURE: "false"
      COACH_CORS_ALLOWED_ORIGINS: "http://localhost:3100,http://localhost:3200"
      COACH_STORAGE_LOCAL_DIR: /var/coach/uploads
      COACH_STORAGE_LOCAL_PUBLIC_URL: "http://localhost:8080/uploads"
      JAVA_OPTS: "-Xms256m -Xmx768m"
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/var/coach/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
  minio-data:
  uploads-data:
