spring:
  application:
    name: cms-api

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:coach_cms}
    username: ${POSTGRES_USER:coach}
    password: ${POSTGRES_PASSWORD:coach_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

coach:
  jwt:
    # dev-only default; override via COACH_JWT_SECRET in prod (≥32 bytes base64url or raw)
    secret: ${COACH_JWT_SECRET:dev-only-jwt-secret-change-in-prod-please-use-at-least-32-bytes}
    access-token-ttl-seconds: ${COACH_JWT_TTL:3600}
    issuer: coach-cms
  seed:
    # Creates an initial admin user if cms_users table is empty (dev only)
    admin-email: ${COACH_SEED_ADMIN_EMAIL:admin@coach.local}
    admin-password: ${COACH_SEED_ADMIN_PASSWORD:admin123}
    admin-name: ${COACH_SEED_ADMIN_NAME:Initial Admin}
    enabled: ${COACH_SEED_ENABLED:true}

server:
  port: ${CMS_API_PORT:8080}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.coach.cms: DEBUG
    org.springframework.security: INFO
